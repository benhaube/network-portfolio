[cmd_duration]
style = 'bold cyan'
format = 'took [$duration]($style) '

[battery]
format = '[$symbol$percentage ]($style)'
full_symbol = '󰁹 '
charging_symbol = '󰂄 '
discharging_symbol = '󰂃 '
empty_symbol = '󰂎 '

