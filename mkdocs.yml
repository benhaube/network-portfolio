    ISP: isp
    IoT: iot
    Active: active
    Backup: backup
    Dashboard: dashboard
    Desktop: desktop
    DNS: dns
    Docker: docker
    Docker Host: docker_host
    Domain: domain
    Download: download
    File Share: file-share
    Hardware: hardware
    Inactive: inactive
    Infrastructure: infra
    Inventory: inventory
    Laptop: laptop
    Linux: linux
    Living Room: living-room
    Map: map
    Mini-Rack: mini-rack
    Mobile: mobile
    Monitor: monitor
    NAS: nas
    Network: network
    Native: native
    Office: office
    PC: pc
    Podman: podman
    Podman Host: podman_host
    Policy: policy
    Printing: print
    Printer Cart: printer-cart 
    Remote Access: remote
    Router: router
    Security: security
    Server: server
    Service: service
    Shell: shell
    Software: software
    Switch: switch
    Tools: tools
    Video: video
    Virtual Host: vh 
    Virtual Machine: vm
    VLAN: vlan 
    VPN: vpn
    Windows: windows

# --- Copyright message in site footer w/ cookies consent button ---
copyright: >
  Copyright&copy; 2026 Benjamin Haube -
  <a href="#__consent">Change cookie settings</a>

# --- Extra CSS stylesheets ---
extra_css:
  - assets/stylesheets/extra.css

# --- Project Repository URL & Docs directory ---
repo_url: https://github.com/benhaube/network-portfolio
repo_name: benhaube/network-portfolio
edit_uri: edit/main/docs/
