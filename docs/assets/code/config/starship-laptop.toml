# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# Inserts a blank line between shell prompts
add_newline = true

# Move the directory to the second line
# format = '$all$directory$character'

# move the rest of the prompt to the right
# right_format = """$all"""

continuation_prompt = '[ÔØ»ÔØ» ](bright-black)'

[character]
success_symbol = '[ÔØ»](bold green)'
error_symbol = '[ÔØ»](bold red)'

[battery]
format = '[$symbol$percentage ]($style)'
full_symbol = '¾░ü╣ '
charging_symbol = '¾░éä '
discharging_symbol = '¾░éâ '
empty_symbol = '¾░éÄ '

[[battery.display]]
threshold = 10
style = 'bold red'
charging_symbol = '¾░ó£ '
discharging_symbol = '¾▒âı '

[[battery.display]]
threshold = 20
style = 'bold red'
charging_symbol = '¾░éå '
discharging_symbol = '¾░ü╗ '    

[[battery.display]]
threshold = 30
style = 'bold yellow'
charging_symbol = '¾░éç '
discharging_symbol = '¾░ü╝ '

[[battery.display]]
