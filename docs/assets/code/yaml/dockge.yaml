services:
  dockge:
    image: louislam/dockge:1
    restart: unless-stopped
    ports:
      - 5001:5001
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/app/data
      # - /root/.docker/:/root/.docker  (1)
      - /opt/stacks:/opt/stacks  # (2)!
    environment:
      - DOCKGE_STACKS_DIR=/opt/stacks  # (3)!
      - DOCKGE_CONSOLE_ENBLE=true