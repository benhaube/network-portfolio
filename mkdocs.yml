# yaml-language-server: $schema=https://squidfunk.github.io/mkdocs-material/schema.json

# --- Site Name and URL ---
site_name: Network Documentation & Portfolio
site_url: https://portfolio.rac3r4life.online
site_description:  My personal, self-hosted portfolio website and blog made with Material for MkDocs.

# --- Theme Settings ---
theme:
  name: material
  custom_dir: overrides
  # -- Light, Dark, and Automatic toggles --
  palette:
    # - Toggle for automatic mode -
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    # - Toggle for light mode - 
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: green
      accent: light blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # - Toggle for dark mode -
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: green
      accent: light blue
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  font:
    text: Google Sans Flex
    code: Google Sans Code
  # -- Icon Settings--
  icon:
    logo: material/file-document-multiple
    repo: fontawesome/brands/git-alt
    # -- Icons for Tags --
    tag:
      default: material/tag
      3D-printer: material/printer-3d-nozzle
      isp: material/wan
      iot: material/home-automation
      active: material/check
      backup: material/cloud-upload-outline
      dashboard: material/view-dashboard
      desktop: material/desktop-tower
      dns: material/dns
      docker: material/docker
      docker_host: material/docker
      domain: material/domain
      download: material/download
      file-share: material/share
      hardware: material/devices
      inactive: material/close
      infra: material/router-network
      inventory: material/list-box-outline
      laptop: material/laptop
      linux: material/linux
      living-room: material/sofa
      map: material/sitemap
      mini-rack: devices/10-inch-rack
      mobile: material/tablet-cellphone
      monitor: symbols/monitor-heart
      nas: material/nas
      network: material/lan 
      native: material/linux
      office: material/desk
      pc: material/desktop-classic
      podman: simple/podman
      podman_host: simple/podman
      policy: symbols/policy-fill
      print: material/printer
      printer-cart: material/printer
      remote: material/remote-desktop
      router: material/router-wireless
      security: material/security
      server: material/server-outline
      service: material/web
      shell: material/console
      software: material/application
      switch: material/switch
      tools: material/tools
      video: material/video
      vh: simple/qemu
      vlan: material/security-network
      vm: material/network-pos
      vpn: material/vpn
      windows: material/microsoft
    top: material/arrow-up-bold
    previous: material/arrow-left-bold
    next: material/arrow-right-bold
    search: material/magnify
    share: material/share-variant
    annotation: material/plus-circle
    edit: material/file-edit-outline
    view: material/file-eye-outline
  favicon: /assets/favicon.svg
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tabs
    - navigation.sections
    - navigation.path
    - navigation.footer
    - toc.follow
    - toc.integrate
    - navigation.top
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.select
    - content.code.annotate
    - content.action.edit
    - content.action.view
    - content.tooltips

# --- Markdown Extensions & Settings ---
markdown_extensions:
  - attr_list
  - abbr
  - admonition
  - tables
  - def_list
  - footnotes
  - toc:
      permalink: true
      permalink_title: Permanent link
  - pymdownx.keys
  - pymdownx.details
  - pymdownx.smartsymbols
  - pymdownx.snippets:
      base_path:
        - .
        - docs/assets/code/mermaid
      auto_append:
        - includes/abbreviations.md
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.blocks.caption
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      options:
        custom_icons:
          - overrides/.icons
  - pymdownx.highlight:
      use_pygments: true
      auto_title: false
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tasklist:
      custom_checkbox: true
      clickable_checkbox: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
          
# --- MkDocs Native Plugins ---
plugins:
  - meta:
      enabled: true
  - search
  - open-in-new-tab:
      add_icon: false
  - awesome-nav
  - roamlinks
  - callouts
  - panzoom:
      full_screen: true
      always_show_hint: true 
  # - git-committers:
      # enabled: true
      # repository: benhaube/network-portfolio
      # branch: main
  - tags:
      export: true
      tags_sort_by: !!python/name:material.plugins.tags.tag_name_casefold
  - optimize:
      optimize_exclude:
        - blog/*
  - social:
      log: true
      log_level: warn
      cards_layout_options:
        font_family: Google Sans Flex
  - blog:
      authors: true
      authors_file: "{blog}/.authors.yml"
      authors_profiles: true
      categories_slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
      post_slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
      post_excerpt_separator: <!-- more -->
      post_readtime_words_per_minute: 265 
  - glightbox:
      touchNavigation: true
      loop: false
      effect: zoom
      slide_effect: slide
      width: 100%
      height: auto
      zoomable: true
      draggable: true
      auto_themed: true
      auto_caption: false
      caption_position: bottom
      background: none
      shadow: true
      manual: true

# --- Watch directories outside of /docs --- 
watch:
  - includes

# --- Disable directory URLs ---
use_directory_urls: false

# --- Extra Settings ---
extra:
  status:
    new: Recently added
    deprecated: Will be removed soon
  # -- Cookies Consent Message --
  consent:
    title: Cookie consent
    description: >-
      We use cookies to recognize your repeated visits and preferences, as well
      as to measure the effectiveness of our documentation and whether users
      find what they're searching for. With your consent, you're helping us to
      make our documentation better.
  social:
    - icon: simple/github
      link: https://github.com/benhaube
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/benjamin-haube/
    - icon: simple/printables
      link: https://www.printables.com/@rac3r4life
    - icon: simple/gravatar
      link: https://benhaube.link
    - icon: simple/bluesky
      link: https://bsky.app/profile/rac3r4life.me
  generator: false
  # -- Tag definitions for custom tag icons ^^ above ^^ --
  tags:
